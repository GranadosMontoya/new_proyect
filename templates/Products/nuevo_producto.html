{% extends 'base.html' %}
{% load static %}

{% block head %}
    <title>Registrar Producto</title>
    <link rel="stylesheet" href="{% static 'css/Product/nuevo_producto.css' %}">
{% endblock %}

{% block content %}
<div class="container mt-5" style="max-width: 900px;">

    <h2 class="text-center titulo-pagina">Registrar Nuevo Producto</h2>

    <form class="card p-4" id="product_form" enctype="multipart/form-data">
        <div class="mb-3">
            <label for="nombre" class="form-label">Nombre del Producto</label>
            <input type="text" name="nombre" class="form-control" id="nombre" placeholder="Ej: Producto1" required>
        </div>
    
        <div class="row">
            <div class="col-md-6 mb-3">
                <label for="sku" class="form-label">SKU</label>
                <input type="text" name="sku" class="form-control" id="sku" placeholder="Código SKU">
            </div>
            <div class="col-md-6 mb-3">
                <label for="codigo_barras" class="form-label">Código de Barras</label>
                <input type="text" name="codigo_barras" class="form-control" id="codigo_barras" placeholder="Código de Barras">
            </div>
        </div>
    
        <div class="mb-3">
            <label for="imagen" class="form-label">Imagen del Producto</label>
            <input type="file" name="imagen" class="form-control" id="imagen" accept="image/*">
        </div>
    
        <div class="row">
            <div class="col-md-6 mb-3">
                <label for="precio_base" class="form-label">Precio Base</label>
                <input type="number" name="precio_base" class="form-control" id="precio_base" placeholder="Ej: 5000" min="0" required>
            </div>
            <div class="col-md-6 mb-3">
                <label for="precio_publico" class="form-label">Precio Público</label>
                <input type="number" name="precio_publico" class="form-control" id="precio_publico" placeholder="Ej: 8000" min="0" required>
            </div>
        </div>
    
        <div class="row">
            <div class="col-md-6 mb-3">
                <label for="cantidad" class="form-label">Cantidad</label>
                <input type="number" name="cantidad" class="form-control" id="cantidad" placeholder="Ej: 50" min="0">
            </div>
            <div class="col-md-6 mb-3">
                <label for="stock_minimo" class="form-label">Stock Mínimo</label>
                <input type="number" name="stock_minimo" class="form-control" id="stock_minimo" placeholder="Ej: 10" min="0">
            </div>
        </div>
    
        <div class="row">
            <div class="col-md-6 mb-3">
                <label for="categoria" class="form-label">Categoría</label>
                <div class="input-group">

                    <select class="form-select" name="categoria" id="categoria" required>
                        <!-- Opciones cargadas vía AJAX -->
                    </select>

                    <!-- Button trigger modal -->
                    <button type="button" class="btn btn-outline-success" data-bs-toggle="modal" data-bs-target="#modalCategoria" id="add_category_btn" title="Agregar categoría">
                        <i class="bi bi-plus-lg"></i>
                    </button>
                </div>
            </div>
            <div class="col-md-6 mb-3">
                <label for="proveedor" class="form-label">Proveedor</label>
                <select class="form-select" name="proveedor" id="proveedor" required>
                    <!-- Opciones cargadas vía AJAX -->
                </select>
            </div>
        </div>
    
        <div class="mb-3">
            <label for="fecha_vencimiento" class="form-label">Fecha de Vencimiento</label>
            <input type="date" name="fecha_vencimiento" class="form-control" id="fecha_vencimiento">
        </div>
    
        <div class="row">
            <div class="col-md-6 mb-3">
                <label for="unidad_medida" class="form-label">Unidad de Medida</label>
                <select class="form-select" name="unidad_medida" id="unidad_medida" required>
                    <option value="" disabled selected>Seleccione una unidad</option>
                    <option value="unidad">Unidad</option>
                    <option value="kg">Kilogramos</option>
                    <option value="lt">Litros</option>
                    <option value="gr">Gramos</option>
                </select>
            </div>
    
            <div class="col-md-6 mb-3">
                <label for="perecedero" class="form-label">¿Es perecedero?</label>
                <select class="form-select" name="perecedero" id="perecedero" required>
                    <option value="" disabled selected>Seleccione una opción</option>
                    <option value="true">Sí</option>
                    <option value="false">No</option>
                </select>
            </div>
        </div>
    
        <div class="row">
            <div class="col-md-6 mb-3">
                <label for="impuesto" class="form-label">Impuesto (%)</label>
                <input type="number" name="impuesto" class="form-control" id="impuesto" placeholder="Ej: 5.00" step="0.01" min="0">
            </div>
            <div class="col-md-6 mb-3">
                <label for="descuento" class="form-label">Descuento (%)</label>
                <input type="number" name="descuento" class="form-control" id="descuento" placeholder="Ej: 10.00" step="0.01" min="0">
            </div>
        </div>
    
        <div class="mb-3">
            <label for="estado" class="form-label">Estado del Producto</label>
            <select class="form-select" name="estado" id="estado" required>
                <option value="" disabled selected>Seleccione un estado</option>
                <option value="activo">Activo</option>
                <option value="agotado">Agotado</option>
                <option value="descontinuado">Descontinuado</option>
            </select>
        </div>
    
        <div class="mb-3">
            <label for="motivo_actualizacion" class="form-label">Motivo de la Actualización</label>
            <textarea name="motivo_actualizacion" class="form-control" id="motivo_actualizacion" placeholder="Motivo del cambio en el producto..." rows="2"></textarea>
        </div>
    
        <div class="text-center">
            <button type="submit" class="btn btn-success">
                <i class="bi bi-save"></i> Registrar Producto
            </button>
        </div>
    </form>

</div>


<!-- Modal para categorias -->
<div class="modal fade" id="modalCategoria" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-sm">
        <div class="modal-content border-0 rounded-4 shadow">

            <form id="formCategoria">

                <!-- Header -->
                <div class="modal-header border-0 pb-0">
                    <div>
                        <h5 class="modal-title fw-bold text-success mb-1">
                            Crear nueva categoría
                        </h5>
                        <small class="text-muted">
                            Define una categoría para organizar tus productos
                        </small>
                    </div>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <!-- Body -->
                <div class="modal-body pt-4">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">
                            Nombre de la categoría
                        </label>
                        <input
                            type="text"
                            name="nombre_categoria"
                            id="nombre_categoria"
                            class="form-control form-control-lg"
                            placeholder="Ej: Lácteos"
                            required
                        >
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-semibold">
                            Descripción
                        </label>
                        <textarea
                            id="descripcion_categoria"
                            name="descripcion"
                            class="form-control"
                            rows="3"
                            placeholder="Descripción breve (opcional)"
                        ></textarea>
                    </div>
                </div>

                <!-- Footer -->
                <div class="modal-footer border-0">
                    <button type="button"
                            class="btn btn-outline-secondary"
                            data-bs-dismiss="modal">
                        Cancelar
                    </button>

                    <button type="submit" class="btn btn-success">
                        Guardar categoría
                    </button>
                </div>

            </form>

        </div>
    </div>
</div>

<!-- TOSTADA -->
<div id="contenedorToasts" class="toast-container position-fixed bottom-0 end-0 p-3">
  <div class="toast" role="alert" aria-live="assertive" aria-atomic="true">
    <div class="toast-header">
      <img src="..." class="rounded me-2" alt="...">
      <strong class="me-auto">Bootstrap</strong>
      <small class="text-body-secondary">just now</small>
      <button type="button" class="btn-close" data-bs-dismiss="toast" aria-label="Close"></button>
    </div>
  </div>
</div>


{% endblock content %}

{% block script %}
    <script src="{% static 'js/Product/nuevo_producto.js' %}"></script>
{% endblock script %}
